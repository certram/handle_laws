# OCR 配置（图片型PDF的文字识别）
ocr:
  provider: "zhipu"              # "zhipu" 使用智谱GLM-OCR，"ocrmypdf" 使用本地Tesseract
  api_key: "d3cab794a0fb4986bdd33d5e203c5a71.qIPt7bwFkF1PRJ05"                    # 智谱API Key（provider为zhipu时必填）
  model: "glm-ocr"              # 智谱OCR模型：glm-ocr（专用OCR）、glm-4v-flash（免费视觉）、glm-4v-plus
  force: true                   # true=所有PDF都走OCR，false=文本型PDF直接提取，仅图片型走OCR

# 文件命名配置
naming:
  civil_first: "26民初"

# 删除配置：匹配的协助执行通知书将被删除
# 支持的关键词：支付宝、财付通、银行、房产、股权、车辆
delete:
  - "支付宝"
  - "财付通"
  - "银行"
